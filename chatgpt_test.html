<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>Terminal (v1.1)</title>

    <style>
      @font-face {
        font-family: 'TerminalMono';
        src: url('./Sol-Regular.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --bg: #0b0f14;
        --panel: rgba(8, 12, 18, 0.88);
        --border: rgba(255, 255, 255, 0.08);

        --fg: #d7e0ea;
        --muted: #8aa0b3;
        --accent: #7ee787;
        --warn: #f9c74f;
        --err: #ff6b6b;
        --nudge: #ff79c6;

        --fs-mobile: 14px;
        --fs-desktop: 13px;
        --lh: 1.5;
        --ls: 0px;

        --pad: 18px;
        --radius: 14px;
        --help-indent: 2ch;

        --kb: 0px;
        --safe-b: env(safe-area-inset-bottom, 0px);
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background:
          radial-gradient(
            1200px 800px at 30% 20%,
            rgba(126, 231, 135, 0.08),
            transparent 60%
          ),
          radial-gradient(
            900px 600px at 70% 80%,
            rgba(88, 166, 255, 0.08),
            transparent 60%
          ),
          var(--bg);
        color: var(--fg);
        font-family:
          'TerminalMono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          'Liberation Mono', monospace;
        letter-spacing: var(--ls);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }

      body {
        font-size: var(--fs-mobile);
        line-height: var(--lh);
      }

      .statusbar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 6px 10px;
        border-top: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.35);
        font-size: 0.9em;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        pointer-events: none;
      }
      .statusbar[hidden] {
        display: none !important;
      }
      @media (min-width: 820px) {
        body {
          font-size: var(--fs-desktop);
        }
      }

      .frame {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        box-sizing: border-box;
      }

      .terminal {
        width: min(1100px, 100%);
        height: min(760px, 100%);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        user-select: none;
        flex: 0 0 auto;
      }
      .dots {
        display: flex;
        gap: 7px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }
      .title {
        font-size: 12px;
        opacity: 0.9;
      }

      .screen {
        flex: 1 1 auto;
        overflow: auto;
        padding: var(--pad);
        padding-bottom: calc(var(--pad) + var(--kb) + var(--safe-b));
        box-sizing: border-box;
        white-space: pre-wrap;
        word-break: break-word;
        tab-size: 2;
        -webkit-overflow-scrolling: touch;
        caret-color: transparent;
        -webkit-user-select: text;
        user-select: text;
      }

      .dim {
        color: var(--muted);
      }
      .accent {
        color: var(--accent);
      }
      .warn {
        color: var(--warn);
      }
      .err {
        color: var(--err);
      }

      .nudge {
        color: var(--nudge);
        opacity: 0.92;
      }

      .helpword {
        color: var(--nudge);
      }

      .helpitem {
        padding-left: var(--help-indent);
      }
      .helpitem .help-cmd {
        display: inline-block;
        min-width: 8ch;
      }
      .helpitem .help-desc {
        color: var(--muted);
      }

      .line {
        display: block;
      }
      .prompt {
        color: var(--muted);
      }
      .prompt .user {
        color: var(--accent);
      }
      .prompt .host {
        color: var(--warn);
      }
      .prompt .path {
        color: var(--muted);
        opacity: 0.95;
      }

      .cursor {
        display: inline-block;
        width: 0.62em;
        height: 1.05em;
        transform: translateY(0.12em);
        background: var(--fg);
        margin-left: 0.06em;
        animation: blink 1s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      .tok-kw {
        color: var(--warn);
      }
      .tok-fn {
        color: rgba(126, 231, 135, 0.95);
      }
      .tok-str {
        color: rgba(255, 121, 198, 0.95);
      }
      .tok-num {
        color: rgba(88, 166, 255, 0.95);
      }
      .tok-com {
        color: var(--muted);
        opacity: 0.9;
      }
      .tok-op {
        color: rgba(215, 224, 234, 0.9);
      }

      /* ✅ Hidden keyboard input:
       Keep it focusable + on-screen (1px), to satisfy Safari/iOS. */
      textarea#kb {
        position: fixed;
        left: 8px;
        bottom: calc(8px + var(--safe-b));
        width: 2px;
        height: 2px;
        opacity: 0.01; /* not 0 */
        background: transparent;
        color: transparent;
        border: 0;
        padding: 0;
        margin: 0;
        font-size: 16px; /* prevents iOS zoom */
        caret-color: transparent;
        outline: none;
        z-index: 9999;
      }

      .hint {
        display: inline-block;
        margin-top: 6px;
        color: var(--muted);
        opacity: 0.65;
        font-size: 0.95em;
      }

      ::selection {
        background: rgba(126, 231, 135, 0.25);
      }

      /* ✅ Mobile: full-bleed */
      @media (max-width: 600px) {
        .frame {
          padding: 0;
        }
        .terminal {
          width: 100%;
          height: 100%;
          border-radius: 0;
          border-left: 0;
          border-right: 0;
          box-shadow: none;
        }
        .topbar {
          display: none;
        }
        :root {
          --pad: 12px;
          --help-indent: 1ch;
        } /* tight sides */
      }
    </style>
  </head>

  <body>
    <textarea
      id="kb"
      autocomplete="off"
      autocapitalize="off"
      autocorrect="off"
      spellcheck="false"
      inputmode="text"
      aria-label="terminal input"
    ></textarea>

    <div class="frame">
      <div
        class="terminal"
        id="terminal"
        role="application"
        aria-label="Terminal demo"
      >
        <div class="topbar">
          <div class="dots" aria-hidden="true">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="title">Terminal</div>
        </div>

        <div class="screen" id="screen" aria-live="polite"></div>
<div class="statusbar" id="statusbar" hidden>EDIT MODE <span>:q to quit</span></div>
      </div>
    </div>

    <script>
      (() => {
        const terminal = document.getElementById('terminal');
        const screen = document.getElementById('screen');
        const statusbar = document.getElementById('statusbar');
        const kb = document.getElementById('kb');
        if (statusbar) statusbar.hidden = true;

        const host = 'machine';
        const user = 'guest';
        const cwd = '~';
        const version = 'v0.MOTHER>';

        const files = [
          { name: 'README.md', size: '3.1K', modified: 'Feb 23 17:14' },
          { name: 'specimen.txt', size: '2.4K', modified: 'Feb 22 21:08' },
          { name: 'notes.txt', size: '1.2K', modified: 'Feb 20 09:19' },
          { name: 'sketch.js', size: '1.6K', modified: 'Feb 26 18:02' },
          { name: 'index.html', size: '9.8K', modified: 'Feb 23 17:21' },
        ];

        const fileContents = {
          'README.md': 'Terminal prototype.\n\nType help to see available commands.',
          'specimen.txt': 'Specimen preview.\nABCDEFGHIJKLMNOPQRSTUVWXYZ\n0123456789',
          'notes.txt': 'Notes:\nRefine spacing. Refine colour. Keep it dry.',
          'sketch.js': `function setup() {
  createCanvas(400, 400);
}

function draw() {
  background(10);
  stroke(255);
  fill(200, 80, 120);
  circle(mouseX, mouseY, 40);

  if (mouseIsPressed) {
    rect(width / 2 - 50, height / 2 - 50, 100, 100);
  }
}
`,
          'index.html': '<!doctype html> ...',
        };

        const gitCommits = [
          {
            hash: '9f3a2c1',
            date: '2026-02-23',
            msg: 'prototype: inline terminal input on mobile',
          },
          {
            hash: '71c4b0e',
            date: '2026-02-22',
            msg: 'layout: basic terminal frame + theme',
          },
          {
            hash: '4a8d11c',
            date: '2026-02-21',
            msg: 'font: woff2 export + fallback stack',
          },
        ];

        const helpItems = [
          { cmd: 'help', desc: 'show this message' },
          { cmd: 'whoami', desc: 'who are you talking to?' },
          { cmd: 'ls', desc: 'list files' },
          { cmd: 'cat FILE', desc: 'read a file' },
          { cmd: 'git log', desc: 'view commit history' },
          { cmd: 'clear', desc: 'clear screen' },
          { cmd: 'specimen', desc: 'run specimen utility' },
        ];

        // === WRAP_TEST_START ===
const SHOW_WRAP_TEST = false;
const WRAP_TEST_TEXT =
  "This is a long-form text block used to stress-test spacing, punctuation, and natural wrapping on small screens. It should wrap without forced line breaks so we can judge the vertical rhythm and density of the typeface at terminal sizes. Notice commas, periods, apostrophes, parentheses (like this), dashes — and how numbers behave: 0123456789. Also watch how URLs and paths break: /Users/guest/Documents/notes and https://example.com/some/really/long/path. If this still feels huge, we’ll tighten padding or revisit the font’s vertical metrics next.";
// === WRAP_TEST_END ===

        let current = '';
        let isAtBottom = true;
        const history = [];
        let typedEl = null;
        let isEditMode = false;

        // --- Idle nudge (Nudge #1 only) ---
        const NUDGE_DELAY_MS = 5000; // first nudge after 5s
        const NUDGE_PART1 = 'Hey :-)';
        const NUDGE_PART1_GRIN = 'Hey :-D';
        const NUDGE_PART2 = 'Tap here';
        const NUDGE_IN_SPEED = 40; // ms per char (fast)
        const NUDGE_PAUSE1_MS = 1400; // longer pause after part 1
        const NUDGE_HOLD_MS = 1600;
        const NUDGE_OUT_MS = 420;

        const SCRAMBLE_CHARS =
          'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%&*+-/\\=_:;?';

        let idleTimer = null;
        let nudgeUsed = false;

        const nudge = {
          active: false,
          phase: 'in', // "in" | "hold" | "out"
          text: '',
          raf: 0,
          t0: 0,
        };

        function cancelNudge() {
          if (!nudge.active) return;
          if (nudge.raf) cancelAnimationFrame(nudge.raf);
          nudge.active = false;
          nudge.phase = 'in';
          nudge.text = '';
          nudge.raf = 0;
          nudge.t0 = 0;
        }

        function resetIdleTimer() {
          if (idleTimer) clearTimeout(idleTimer);
          if (nudgeUsed) return; // only one nudge for now
          idleTimer = setTimeout(() => {
            if (current.length === 0 && document.activeElement !== kb)
              startNudge();
          }, NUDGE_DELAY_MS);
        }

        function scrambleFrame(target, progress) {
          // progress: 0..1
          // Reveal grows: 1 char, 2 chars, 3...; newest char scrambles while arriving.
          const n = target.length;
          const visible = Math.max(1, Math.ceil(progress * n));

          let out = '';
          const lockedCount = Math.max(0, visible - 1);

          for (let i = 0; i < lockedCount; i++) out += target[i];

          const newestIndex = visible - 1;
          if (newestIndex < n) {
            if (progress >= 1) out += target[newestIndex];
            else
              out +=
                SCRAMBLE_CHARS[
                  Math.floor(Math.random() * SCRAMBLE_CHARS.length)
                ];
          }

          return out;
        }

        // === NUDGE_START ===
        function startNudge() {
          if (nudgeUsed) return;
          cancelNudge();
          nudgeUsed = true;

          // Phase 1 (keep exactly as current)
          const phase1 = [
            { text: 'help' },
            { text: 'git log' },
            { text: 'whoami' },
          ];

          // Phase 2 (same style, slower/heavier)
          const phase2Text = 'help';
          const phase2Cycles = 3;
          const phaseGapMs = 5000; // wait 5s before phase 2

          let stage = 'phase1'; // phase1 | gap | phase2
          let stepIndex = 0;
          let cycle = 0;
          let phase = 'in'; // in | hold | out

          nudge.active = true;
          nudge.t0 = performance.now();

          const tick = (t) => {
            if (!nudge.active) return;

            const elapsed = t - nudge.t0;

            // -------------------------
            // PHASE 1 (fast ghosts)
            // -------------------------
            if (stage === 'phase1') {
              const currentStep = phase1[stepIndex];
              const fullText = currentStep.text;

              if (phase === 'in') {
                const chars = Math.min(
                  fullText.length,
                  Math.floor(elapsed / 30),
                );
                setTypedOnly(fullText.slice(0, chars), true);

                if (chars >= fullText.length) {
                  phase = 'hold';
                  nudge.t0 = t;
                }
              } else if (phase === 'hold') {
                setTypedOnly(fullText, true);

                if (elapsed >= 250) {
                  phase = 'out';
                  nudge.t0 = t;
                }
              } else if (phase === 'out') {
                const remove = Math.floor(elapsed / 25);
                const remaining = Math.max(0, fullText.length - remove);
                setTypedOnly(fullText.slice(0, remaining), true);

                if (remaining <= 0) {
                  stepIndex++;
                  if (stepIndex >= phase1.length) {
                    // switch to a short gap, then phase 2
                    stage = 'gap';
                    phase = 'in';
                    nudge.t0 = t;
                    setTypedOnly('', true);
                  }
                  phase = 'in';
                  nudge.t0 = t;
                }
              }
            } else if (stage === 'gap') {
              // wait a bit so phase 2 reads as a second thought
              setTypedOnly('', true);
              if (elapsed >= phaseGapMs) {
                stage = 'phase2';
                phase = 'in';
                nudge.t0 = t;
              }
            }

            // -------------------------
            // PHASE 2 (repeat help)
            // -------------------------
            else if (stage === 'phase2') {
              const fullText = phase2Text;

              if (phase === 'in') {
                const chars = Math.min(
                  fullText.length,
                  Math.floor(elapsed / 55),
                );
                setTypedOnly(fullText.slice(0, chars), true);

                if (chars >= fullText.length) {
                  phase = 'hold';
                  nudge.t0 = t;
                }
              } else if (phase === 'hold') {
                setTypedOnly(fullText, true);

                if (elapsed >= 650) {
                  phase = 'out';
                  nudge.t0 = t;
                }
              } else if (phase === 'out') {
                const remove = Math.floor(elapsed / 45);
                const remaining = Math.max(0, fullText.length - remove);
                setTypedOnly(fullText.slice(0, remaining), true);

                if (remaining <= 0) {
                  cycle++;
                  if (cycle >= phase2Cycles) {
                    cancelNudge();
                    setTypedOnly('', false);
                    render();
                    return;
                  }
                  phase = 'in';
                  nudge.t0 = t;
                }
              }
            }

            nudge.raf = requestAnimationFrame(tick);
          };

          nudge.raf = requestAnimationFrame(tick);
        }

        // === NUDGE_END ===

        function esc(s) {
          return s.replace(
            /[&<>"]/g,
            (c) =>
              ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c],
          );
        }

        // === HEADER_START ===
        function nowLoginLine() {
          const d = new Date();
          const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          const mons = [
            'Jan',
            'Feb',
            'Mar',
            'Apr',
            'May',
            'Jun',
            'Jul',
            'Aug',
            'Sep',
            'Oct',
            'Nov',
            'Dec',
          ];

          const day = days[d.getDay()];
          const mon = mons[d.getMonth()];
          const date = String(d.getDate()).padStart(2, '0');

          const hh = String(d.getHours()).padStart(2, '0');
          const mm = String(d.getMinutes()).padStart(2, '0');
          const ss = String(d.getSeconds()).padStart(2, '0');

          return `Last session: ${day} ${mon} ${date} ${hh}:${mm}:${ss}`;
        }

        // === HEADER_END ===

        function promptHTML() {
          return `<span class="prompt"><span class="user">${esc(
            user,
          )}</span>@<span class="host">${esc(host)}</span>:<span class="path">${esc(cwd)}</span>$</span> `;
        }

        function scrollToBottom() {
          // iOS Safari can land 1–2px off after viewport/keyboard changes.
          // Force a hard pin immediately, then confirm on the next frame.
          try {
            screen.scrollTop = 1e9;
          } catch (e) {}
          requestAnimationFrame(() => {
            screen.scrollTop = screen.scrollHeight;
          });
        }

        function printLine(html, cls = '') {
          const classAttr = cls ? `line ${cls}` : `line`;
          history.push(`<span class="${classAttr}">${html}</span>`);
        }

        function printBlock(text, cls = '') {
          const safe = esc(text);
          const lines = safe
            .split('\n')
            .map(
              (l) => `<span class="line${cls ? ' ' + cls : ''}">${l}</span>`,
            );
          history.push(lines.join(''));
        }

        function unknown(cmd) {
          printLine(`<span class="err">${esc(cmd)}: command not found</span>`);
          printLine(`Type '<span class="helpword">help</span>' for commands.`);
        }

        function printHelp() {
          printLine('Commands', 'dim');
          for (const item of helpItems) {
            printLine(
              `<span class="helpitem"><span class="help-cmd">${esc(item.cmd)}</span><span class="help-desc">${esc(item.desc)}</span></span>`,
              '',
            );
          }
        }

        function printHTMLBlock(htmlLines) {
          // htmlLines: array of already-escaped HTML lines
          const lines = htmlLines.map((l) => `<span class="line">${l}</span>`);
          history.push(lines.join(''));
        }

        function highlightJS(code) {
          const kw = new Set([
            'function',
            'return',
            'if',
            'else',
            'for',
            'while',
            'const',
            'let',
            'var',
            'new',
            'true',
            'false',
            'null',
          ]);

          const outLines = [];
          const lines = code.replace(/\r\n/g, '\n').split('\n');

          for (const line of lines) {
            let i = 0;
            let html = '';

            while (i < line.length) {
              const ch = line[i];

              // Line comment
              if (ch === '/' && line[i + 1] === '/') {
                const rest = line.slice(i);
                html += `<span class="tok-com">${esc(rest)}</span>`;
                i = line.length;
                break;
              }

              // Strings: ', ", `
              if (ch === '"' || ch === "'" || ch === '`') {
                const quote = ch;
                let j = i + 1;
                let closed = false;
                while (j < line.length) {
                  const cj = line[j];
                  if (cj === '\\') {
                    j += 2;
                    continue;
                  }
                  if (cj === quote) {
                    j++;
                    closed = true;
                    break;
                  }
                  j++;
                }
                const token = line.slice(i, j);
                html += `<span class="tok-str">${esc(token)}</span>`;
                i = j;
                continue;
              }

              // Numbers
              if (/[0-9]/.test(ch)) {
                let j = i + 1;
                while (j < line.length && /[0-9.]/.test(line[j])) j++;
                html += `<span class="tok-num">${esc(line.slice(i, j))}</span>`;
                i = j;
                continue;
              }

              // Identifiers / keywords
              if (/[A-Za-z_$]/.test(ch)) {
                let j = i + 1;
                while (j < line.length && /[A-Za-z0-9_$]/.test(line[j])) j++;
                const word = line.slice(i, j);

                if (kw.has(word)) {
                  html += `<span class="tok-kw">${esc(word)}</span>`;
                  i = j;
                  continue;
                }

                // Function name after `function `
                // (cheap heuristic: if previous non-space token is 'function')
                let k = i - 1;
                while (k >= 0 && line[k] === ' ') k--;
                const before = line.slice(0, i);
                const isFn = /\bfunction\s+$/.test(before);
                if (isFn) {
                  html += `<span class="tok-fn">${esc(word)}</span>`;
                } else {
                  html += esc(word);
                }

                i = j;
                continue;
              }

              // Operators / punctuation (just lightly tinted)
              if (/[][(){}.,;:+\-*/=<>!]/.test(ch)) {
                html += `<span class="tok-op">${esc(ch)}</span>`;
                i++;
                continue;
              }

              // Everything else (spaces etc.)
              html += esc(ch);
              i++;
            }

            outLines.push(html);
          }

          return outLines;
        }

        function runCommand(raw) {
  const input = raw.trim();
  printLine(`${promptHTML()}${esc(raw)}`);

  if (!input) return;

  const parts = input.split(/\s+/);
  const head = (parts[0] || '').toLowerCase();
  const lower = input.toLowerCase();

  if (head === 'help') {
    printHelp();
    return;
  }

  if (head === 'specimen') {
    printBlock(`
Pinkslap 0.1
(working title)

ABCDEFGHIJKLMNOPQRSTUVWXYZ
abcdefghijklmnopqrstuvwxyz
0123456789
.,:;!?*# /\\-—_(){}[]"'@&|$+−=><~^%\`´
`);
    return;
  }

  // === EDIT MODE BLOCK ===
  if (head === 'edit') {
    isEditMode = true;
    current = '';
    kb.value = '';
    render();
    scrollToBottom();
    return;
  }

  if (head === 'whoami') {
    printLine(`${esc(user)}`);
    return;
  }

  if (head === 'ls') {
    const out = files
      .map((f) => `${f.modified}  ${f.size.padStart(4, ' ')}  ${f.name}`)
      .join('\n');
    printBlock(out, '');
    return;
  }

  if (lower === 'git log') {
    const out = gitCommits.map((c) => `${c.hash}  ${c.date}  ${c.msg}`).join('\n');
    printBlock(out, '');
    return;
  }

  if (head === 'cat') {
    if (parts.length === 1) {
      printLine('cat: missing file operand');
      printLine("Try 'ls'.");
      return;
    }

    const filename = parts.slice(1).join(' ');

    // Exact match first
    let key = filename;

    // Case-insensitive fallback (mobile-friendly)
    if (!fileContents[key]) {
      const want = filename.toLowerCase();
      key = Object.keys(fileContents).find((k) => k.toLowerCase() === want);
    }

    if (!key || !fileContents[key]) {
      printLine(`cat: ${esc(filename)}: No such file`);
      return;
    }

    if (key === 'sketch.js') {
      printHTMLBlock(highlightJS(fileContents[key]));
    } else {
      printBlock(fileContents[key]);
    }
    return;
  }

  if (head === 'clear') {
    history.length = 0;
    return;
  }

  unknown(input);
}

        function render() {
          // While typing (kb focused), keep the terminal pinned.
          // iOS can report scroll metrics 1–2px off during keyboard/layout changes,
          // which causes a tiny nudge on the first keystroke.
          if (document.activeElement !== kb) {
            const nearBottom =
              screen.scrollTop + screen.clientHeight >=
              screen.scrollHeight - 12;
            isAtBottom = nearBottom;
          } else {
            isAtBottom = true;
          }

          const lines = [];
          // === INITIAL_SCREEN_START ===
          lines.push(`<span class="line">${esc(nowLoginLine())}</span>`);
          lines.push(
            `<span class="line">Connection established.</span>`,
          );
          lines.push(
            `<span class="line">Awaiting input.</span>`,
          );
          // === INITIAL_SCREEN_END ===

          for (const item of history) lines.push(item);

          if (isEditMode) {
            lines.push(`<span class="line dim">-- EDIT MODE --</span>`);
            lines.push(
              `<span class="line">${esc(current)}<span class="cursor" aria-hidden="true"></span></span>`,
            );
          } else {
            lines.push(
              `<span class="line">${promptHTML()}<span id="typed">${esc(current)}</span><span class="cursor" aria-hidden="true"></span></span>`,
            );
          }

          // Toggle fixed status bar outside scroll area
          if (statusbar) statusbar.hidden = !isEditMode;

          if (SHOW_WRAP_TEST) {
            lines.push(`<span class="line">${esc(WRAP_TEST_TEXT)}</span>`);
          }

          screen.innerHTML = lines.join('');
          typedEl = document.getElementById('typed');
          if (isAtBottom) scrollToBottom();
        }

        function setTypedOnly(text, isNudge) {
          if (!typedEl) return;
          typedEl.textContent = text;
          typedEl.className = isNudge ? 'nudge' : '';
        }

        function safeFocus() {
          cancelNudge();
          resetIdleTimer();
          // When user taps to type, we behave like a real terminal: keep the prompt pinned.
          isAtBottom = true;

          // Must be in a user gesture. No options object. Keep it simple.
          try {
            kb.focus();
          } catch (e) {}

          // Kick a couple of re-pins because iOS can resize the viewport a tick later.
          scrollToBottom();
          setTimeout(scrollToBottom, 0);
          setTimeout(scrollToBottom, 120);

          render();
        }

        // ✅ Use click + touchend (Safari-friendly) — NOT passive.
        terminal.addEventListener('click', (e) => {
          // Avoid stealing focus when user is selecting text
          if (window.getSelection && String(window.getSelection()) !== '')
            return;
          safeFocus();
        });

        terminal.addEventListener(
          'touchend',
          (e) => {
            // Prevent the “ghost click” double-trigger on some setups
            // but still allow scroll gestures (touchend is fine)
            safeFocus();
          },
          { passive: false },
        );

        screen.addEventListener(
          'scroll',
          () => {
            cancelNudge();
            resetIdleTimer();
            const nearBottom =
              screen.scrollTop + screen.clientHeight >=
              screen.scrollHeight - 12;
            isAtBottom = nearBottom;
          },
          { passive: true },
        );

        kb.addEventListener('input', () => {
          cancelNudge();
          resetIdleTimer();
          current = kb.value;
          render();
        });

        kb.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();

    if (isEditMode) {
  const linesNow = current.replace(/\r\n/g, '\n').split('\n');
  const lastLine = (linesNow[linesNow.length - 1] || '').trim();

  if (lastLine === ':q') {
    linesNow.pop();               // remove the :q line
    current = linesNow.join('\n'); // keep whatever was typed
    isEditMode = false;
    kb.value = '';
    render();
    return;
  }

  current += '\n';
  kb.value = current;
  render();
  scrollToBottom();
  return;
}

    const toRun = current;
    current = '';
    kb.value = '';
    runCommand(toRun);
    render();
    scrollToBottom();
  }
});

        function updateKeyboardInset() {
          const vv = window.visualViewport;
          let kbPx = 0;

          if (vv) {
            const diff = window.innerHeight - vv.height - vv.offsetTop;
            kbPx = Math.max(0, Math.round(diff));
          }
          document.documentElement.style.setProperty('--kb', kbPx + 'px');
          if (document.activeElement === kb) {
            scrollToBottom();
          } else if (isAtBottom) {
            scrollToBottom();
          }
        }

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', updateKeyboardInset);
          window.visualViewport.addEventListener('scroll', updateKeyboardInset);
        }
        window.addEventListener('resize', updateKeyboardInset);

        // Init
        updateKeyboardInset();
        render();
        scrollToBottom();
        resetIdleTimer();

        // Desktop: click to focus (no auto-focus to avoid fighting Safari policies)
      })();
    </script>
  </body>
</html>
