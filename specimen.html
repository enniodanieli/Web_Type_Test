<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
@font-face {
  font-family: 'Sol';
  src: url('Sol-Regular.woff2') format('woff2');
}

* { 
  margin: 0; 
  padding: 0; 
  box-sizing: border-box; 
}

body {
  font-family: 'Sol';
  font-size: 14px;
  background: #0a0a0a;
  color: #ff8800;
  height: 100vh;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
}

.terminal-container {
  height: 100vh;
  overflow-y: auto;
  padding: 24px;
}

.terminal-content {
  max-width: 800px;
}

.terminal-line {
  margin-bottom: 4px;
  line-height: 1.5;
}

.prompt {
  color: #ff8800;
}

.command {
  color: #ff8800;
}

.output {
  color: #cc6600;
  margin-left: 0;
}

.input-line {
  display: flex;
}

.input-field {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #ff8800;
  font-family: 'Sol';
  font-size: 14px;
  padding: 0;
  margin-left: 4px;
  caret-color: #ff8800;
}

/* Mobile: prevent zoom, autocorrect, etc */
.input-field {
  font-size: 16px; /* Prevents iOS zoom */
  -webkit-appearance: none;
  appearance: none;
}

@media (min-width: 768px) {
  .input-field {
    font-size: 14px;
  }
}

.cursor {
  display: inline-block;
  width: 0.6em;
  height: 1.2em;
  background: #ff8800;
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 2px;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
</style>
</head>
<body>

<div class="terminal-container">
  <div class="terminal-content" id="terminal-content">
    <div class="terminal-line">
      <span class="prompt">user@sol:~$</span> <span class="command">ls fonts/</span>
    </div>
    <div class="terminal-line output">sol-regular.woff2    sol-bold.woff2    README.txt</div>
    
    <div class="terminal-line"></div>
    
    <div class="terminal-line">
      <span class="prompt">user@sol:~$</span> <span class="command">cat README.txt</span>
    </div>
    <div class="terminal-line output">A monospace font for people who stare at terminals all day.</div>
    
    <div class="terminal-line"></div>
    
    <div class="terminal-line">
      <span class="prompt">user@sol:~$</span> <span class="command">whoami</span>
    </div>
    <div class="terminal-line output">just another font trying to make it</div>
    
    <div class="terminal-line"></div>
    
    <div class="terminal-line input-line">
      <span class="prompt">user@sol:~$</span>
      <input 
        type="text" 
        class="input-field" 
        id="command-input"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        autocomplete="off"
      >
    </div>
  </div>
</div>

<script>
// Auto-focus input on load
window.addEventListener('load', () => {
  document.getElementById('command-input').focus();
});

// Keep focus on input when clicking anywhere
document.addEventListener('click', () => {
  document.getElementById('command-input').focus();
});
</script>

</body>
</html>
